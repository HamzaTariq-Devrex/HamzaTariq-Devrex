name: Generate Snake

on:
  # Run every 12 hours
  schedule:
    - cron: "0 */12 * * *"
  # Allow manual runs
  workflow_dispatch:
  # Run on push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake game from contributions
        uses: Platane/snk@v3
        with:
          github_user_name: HamzaTariq-Devrex
          # Generates multiple output files
          outputs: |
            dist/snake.svg?palette=github-dark
            dist/snake-dark.svg?palette=github-dark
            dist/snake-light.svg?palette=github-light

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
