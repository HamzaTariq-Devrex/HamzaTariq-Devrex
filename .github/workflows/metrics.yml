name: Metrics
on:
  schedule: [{ cron: "0 0 * * *" }]
  workflow_dispatch:
  push: { branches: ["main", "master"] }
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: HamzaTariq-Devrex
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Karachi
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_display: large
          config_animations: yes
          # ISOMETRIC CALENDAR (the 3D green grid - already working great)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          # LANGUAGES - FIXED: now includes forked/private repos and raises timeout
          plugin_languages: yes
          plugin_languages_ignored: >-
            html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell,
            gnuplot
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 400
          plugin_languages_threshold: 0%
          # HABITS - FIXED: reduced load so it no longer times out / errors
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: no
          plugin_habits_from: 100
          plugin_habits_languages_limit: 6
          plugin_habits_languages_threshold: 0%
          # ACHIEVEMENTS
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_threshold: C
          # STARGAZERS
          plugin_stargazers: yes
          plugin_stargazers_charts: yes
